# Alembic 설정 파일
# Alembic revision, alembic upgrade 등의 명령이 이 파일을 참조한다.

[alembic]
# 마이그레이션 스크립트가 저장되는 폴더
script_location = alembic

# DB 연결 URL (로컬 개발용 기본값)
# 실제 환경에서는 alembic/env.py에서 프로그래밍 방식으로 오버라이딩 가능
sqlalchemy.url = postgresql+asyncpg://shoptracker:shoptracker@localhost:5432/shoptracker

# --- 아래는 로깅 설정 (기본 구성 그대로) ---

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s